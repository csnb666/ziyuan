<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>游戏中心</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet"><script>tailwind.config={theme:{extend:{colors:{primary:'#2563eb',secondary:'#f8fafc',accent:'#e2e8f0',dark:'#1e293b',light:'#ffffff'},fontFamily:{sans:['Inter','system-ui','sans-serif']},boxShadow:{'tele':'0 4px 20px rgba(0,0,0,0.08)','tele-hover':'0 8px 30px rgba(0,0,0,0.12)'}}}}}</script><style type="text/tailwindcss">@layer utilities{.content-auto{content-visibility:auto;}.card-bg{background:#ffffff;border:1px solid #e2e8f0;}.btn-primary{background:#2563eb;}.video-container{box-shadow:0 10px 40px rgba(37,99,235,0.15);border:1px solid #e2e8f0;}.glass-effect{backdrop-filter:blur(10px);background:rgba(255,255,255,0.9);}}</style></head><body class="bg-secondary min-h-screen text-dark font-sans antialiased"><div class="container mx-auto px-4 py-12 max-w-6xl"><div class="text-center mb-16 opacity-0 animate-fade-in" style="animation-delay:0.1s;"><h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-primary mb-4">游戏中心</h1><p class="text-slate-600 text-lg max-w-2xl mx-auto">游戏中心</p></div><div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8"><div class="card-bg rounded-3xl p-6 shadow-tele transform transition-all duration-300 hover:shadow-tele-hover hover:-translate-y-2 opacity-0 animate-fade-in" style="animation-delay:0.2s;"><div class="flex items-center mb-4"><div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center mr-3"><img src="./Namaiki.png" class="w-8 h-8 object-contain"></div><h2 class="text-xl font-bold">Namaiki</h2></div><p class="text-slate-600 text-sm mb-4">点击下载应用安装包</p><a href="./Namaiki.apk" download class="btn-primary w-full py-3 rounded-2xl flex items-center justify-center text-white font-semibold transition-all duration-300 hover:opacity-90 hover:scale-105" onclick="startDownload(this)"><i class="fa fa-download mr-2"></i><span>立即下载</span></a></div><div class="card-bg rounded-3xl p-6 shadow-tele transform transition-all duration-300 hover:shadow-tele-hover hover:-translate-y-2 opacity-0 animate-fade-in" style="animation-delay:0.3s;"><div class="flex items-center mb-4"><div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center mr-3"><img src="./devastate.png" class="w-8 h-8 object-contain"></div><h2 class="text-xl font-bold">devastate</h2></div><p class="text-slate-600 text-sm mb-4">点击下载应用安装包</p><a href="./devastate.apk" download class="btn-primary w-full py-3 rounded-2xl flex items-center justify-center text-white font-semibold transition-all duration-300 hover:opacity-90 hover:scale-105" onclick="startDownload(this)"><i class="fa fa-download mr-2"></i><span>立即下载</span></a></div><div class="card-bg rounded-3xl p-6 shadow-tele transform transition-all duration-300 hover:shadow-tele-hover hover:-translate-y-2 opacity-0 animate-fade-in" style="animation-delay:0.4s;"><div class="flex items-center mb-4"><div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center mr-3"><i class="fa fa-cloud text-primary text-xl"></i></div><h2 class="text-xl font-bold">云盘获取</h2></div><p class="text-slate-600 text-sm mb-4">前往云盘获取更多资源</p><a href="https://yun163.HJLPP77.com" target="_blank" class="btn-primary w-full py-3 rounded-2xl flex items-center justify-center text-white font-semibold transition-all duration-300 hover:opacity-90 hover:scale-105"><i class="fa fa-external-link mr-2"></i>立即前往</a></div></div><div class="card-bg rounded-3xl p-8 shadow-tele transform transition-all duration-300 hover:shadow-tele-hover hover:-translate-y-2 opacity-0 animate-fade-in" style="animation-delay:0.5s;"><div class="flex items-center mb-6"><div class="w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center mr-4"><i class="fa fa-play-circle text-primary text-2xl"></i></div><h2 class="text-2xl font-bold">视频播放</h2></div><div id="videoCard" class="relative rounded-2xl overflow-hidden bg-slate-900 mb-6 video-container transition-all duration-300 group cursor-pointer" onclick="playVideo()"><div id="videoPlaceholder" class="w-full aspect-video flex flex-col items-center justify-center text-white"><i class="fa fa-play-circle text-5xl mb-3 text-primary"></i><p class="text-lg font-medium">点击播放</p></div><video id="videoPlayer" class="w-full aspect-video object-cover hidden" preload="metadata"><source src="./2.mp4" type="video/mp4">您的浏览器不支持视频播放</video><div class="absolute bottom-0 left-0 right-0 p-4 glass-effect opacity-0 group-hover:opacity-100 transition-opacity duration-300" id="videoControls"><div class="flex flex-col gap-2"><div class="relative h-1 bg-slate-300 rounded-full cursor-pointer" id="progressContainer"><div id="progressBar" class="absolute h-full bg-primary rounded-full" style="width:0%"></div><div id="progressHandle" class="absolute h-3 w-3 bg-primary rounded-full -top-1 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity" style="left:0%"></div></div><div class="flex justify-between items-center"><div class="flex gap-4"><button id="playPauseBtn" class="text-dark hover:text-primary transition-colors"><i class="fa fa-pause text-xl"></i></button><button id="volumeBtn" class="text-dark hover:text-primary transition-colors"><i class="fa fa-volume-up text-xl"></i></button></div><div class="flex gap-4"><span id="timeDisplay" class="text-sm text-slate-600">00:00 / 00:00</span><button id="fullscreenBtn" class="text-dark hover:text-primary transition-colors"><i class="fa fa-expand text-xl"></i></button></div></div></div></div></div></div><footer class="mt-16 text-center text-slate-500 opacity-0 animate-fade-in" style="animation-delay:0.6s;"><p>© 2024 媒体中心</p></footer></div><script>function startDownload(btn){const icon=btn.querySelector('i');const text=btn.querySelector('span');icon.className='fa fa-spinner fa-spin mr-2';text.textContent='下载中...';btn.style.pointerEvents='none';setTimeout(()=>{icon.className='fa fa-download mr-2';text.textContent='立即下载';btn.style.pointerEvents='auto';},5000);}function playVideo(){const placeholder=document.getElementById('videoPlaceholder');const video=document.getElementById('videoPlayer');const controls=document.getElementById('videoControls');placeholder.classList.add('hidden');video.classList.remove('hidden');controls.classList.remove('opacity-0');video.play();}document.addEventListener('DOMContentLoaded',()=>{const fadeElements=document.querySelectorAll('.animate-fade-in');fadeElements.forEach(el=>{el.style.opacity='1';el.style.transform='translateY(0)';});const video=document.getElementById('videoPlayer');const playPauseBtn=document.getElementById('playPauseBtn');const fullscreenBtn=document.getElementById('fullscreenBtn');const progressContainer=document.getElementById('progressContainer');const progressBar=document.getElementById('progressBar');const progressHandle=document.getElementById('progressHandle');const timeDisplay=document.getElementById('timeDisplay');const volumeBtn=document.getElementById('volumeBtn');playPauseBtn.addEventListener('click',(e)=>{e.stopPropagation();if(video.paused){video.play();playPauseBtn.innerHTML='<i class="fa fa-pause text-xl"></i>';}else{video.pause();playPauseBtn.innerHTML='<i class="fa fa-play text-xl"></i>';}});video.addEventListener('ended',()=>{playPauseBtn.innerHTML='<i class="fa fa-play text-xl"></i>';progressBar.style.width='0%';progressHandle.style.left='0%';document.getElementById('videoPlaceholder').classList.remove('hidden');document.getElementById('videoPlayer').classList.add('hidden');});fullscreenBtn.addEventListener('click',(e)=>{e.stopPropagation();if(document.fullscreenElement){document.exitFullscreen();fullscreenBtn.innerHTML='<i class="fa fa-expand text-xl"></i>';}else{video.parentElement.requestFullscreen();fullscreenBtn.innerHTML='<i class="fa fa-compress text-xl"></i>';}});video.addEventListener('timeupdate',()=>{const progress=(video.currentTime/video.duration)*100;progressBar.style.width=`${progress}%`;progressHandle.style.left=`${progress}%`;const currentTime=formatTime(video.currentTime);const duration=formatTime(video.duration);timeDisplay.textContent=`${currentTime} / ${duration}`;});progressContainer.addEventListener('click',(e)=>{e.stopPropagation();const rect=progressContainer.getBoundingClientRect();const pos=(e.clientX-rect.left)/rect.width;video.currentTime=pos*video.duration;});volumeBtn.addEventListener('click',(e)=>{e.stopPropagation();video.muted=!video.muted;volumeBtn.innerHTML=video.muted?'<i class="fa fa-volume-off text-xl"></i>':'<i class="fa fa-volume-up text-xl"></i>';});function formatTime(seconds){const min=Math.floor(seconds/60);const sec=Math.floor(seconds%60);return`${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;}document.addEventListener('keydown',(e)=>{if(e.target.tagName==='VIDEO'){switch(e.key){case' ':e.preventDefault();playPauseBtn.click();break;case'f':fullscreenBtn.click();break;case'ArrowRight':video.currentTime+=5;break;case'ArrowLeft':video.currentTime-=5;break;}}});});</script><style>@keyframes fade-in{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}.animate-fade-in{animation:fade-in 0.6s ease-out forwards;}#progressContainer:hover{height:6px;}.group:hover #progressHandle{opacity:1;}::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:#f1f5f9;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:#2563eb;}</style></body></html>
